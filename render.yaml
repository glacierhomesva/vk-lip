services:
  - type: web
    name: vk-lip-api
    env: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && gunicorn -k uvicorn.workers.UvicornWorker -w 2 -b 0.0.0.0:$PORT app.main:app
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false

  - type: cron
    name: vk-lip-sync-nightly
    env: python
    rootDir: backend
    plan: starter
    schedule: "0 6 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: >-
      python -m app.imports.sync_from_source
      --datasets parcels owners assessments property_types
      --chunk-size 1000
      --progress-every 2000
      --job-name nightly-core
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SOURCE_PARCELS_URL
        sync: false
      - key: SOURCE_OWNERS_URL
        sync: false
      - key: SOURCE_ASSESSMENTS_URL
        sync: false
      - key: SOURCE_PROPERTY_TYPES_URL
        sync: false
      - key: SOURCE_TIMEOUT_SECONDS
        sync: false

  - type: cron
    name: vk-lip-sync-weekly
    env: python
    rootDir: backend
    plan: starter
    schedule: "30 6 * * 0"
    buildCommand: pip install -r requirements.txt
    startCommand: >-
      python -m app.imports.sync_from_source
      --datasets boundary_details
      --chunk-size 1000
      --progress-every 1000
      --job-name weekly-boundary
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SOURCE_BOUNDARY_DETAILS_URL
        sync: false
      - key: SOURCE_TIMEOUT_SECONDS
        sync: false
